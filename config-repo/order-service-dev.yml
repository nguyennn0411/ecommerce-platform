server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ecommerce_order_service
    username: ecommerce
    password: ecommerce
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ecommerce.common.events
        spring.json.value.default.type: com.ecommerce.common.events.PaymentProcessedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

ecommerce:
  service-description: "Creates and processes customer orders using Saga orchestration."
  saga:
    external-services-enabled: false
  kafka:
    enabled: false
    topics:
      order-created: order.created
      payment-processed: payment.processed
