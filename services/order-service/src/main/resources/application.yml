server:
  port: 8084

spring:
  application:
    name: order-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/ecommerce_order_service}
    username: ${SPRING_DATASOURCE_USERNAME:ecommerce}
    password: ${SPRING_DATASOURCE_PASSWORD:ecommerce}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

payment-service:
  base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8085}
  create-payos-path: ${PAYMENT_SERVICE_CREATE_PAYOS_PATH:/api/payments/payos/create}

inventory-service:
  base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8083}
  reservation-path: ${INVENTORY_SERVICE_RESERVATION_PATH:/api/v1/inventory/reservations}
  confirm-path: ${INVENTORY_SERVICE_CONFIRM_PATH:/api/v1/inventory/reservations/{orderId}/confirm}
  release-path: ${INVENTORY_SERVICE_RELEASE_PATH:/api/v1/inventory/reservations/{orderId}/release}

product-service:
  base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8082}
  validation-path: ${PRODUCT_SERVICE_VALIDATION_PATH:/api/v1/products/validation}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
